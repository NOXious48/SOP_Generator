apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels: { app: processiq-api }
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: { app: processiq-api }
  template:
    metadata:
      labels: { app: processiq-api }
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: APP_ENV
              value: {{ .Values.env.APP_ENV | quote }}
            - name: INFERENCE_MODE
              value: {{ .Values.env.INFERENCE_MODE | quote }}
          resources:
{{ toYaml .Values.api.resources | indent 12 }}
          readinessProbe:
            httpGet: { path: /v1/health, port: {{ .Values.api.port }} }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /v1/health, port: {{ .Values.api.port }} }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
spec:
  selector: { app: processiq-api }
  ports:
    - port: 80
      targetPort: {{ .Values.api.port }}
{{- if .Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-api
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
