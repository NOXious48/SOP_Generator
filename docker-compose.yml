# ProcessIQ — one-command run.
#
#   1. Copy .env.example to .env and paste your free Google Gemini API key into it.
#   2. Run:  docker compose up --build
#   3. Open: http://localhost:8000/app
#
# This runs the API + web UI in a single lean container (no GPU needed). SOP generation uses the
# hosted Gemini model via the key in your .env. (The optional datastores live in
# docker-compose.infra.yml and are NOT needed to use the app.)
services:
  processiq:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    image: processiq-api:latest
    container_name: processiq
    ports:
      - "8000:8000"
    env_file:
      - .env                      # supplies your HOSTED_VLM_API_KEY (Gemini)
    environment:
      MODEL_PROFILE: mock         # no local GPU/CV models inside the container
      INFERENCE_MODE: hosted      # generate SOPs via the hosted Gemini key from .env
      GROUND_BBOX: "0"            # skip local OCR grounding (keeps the image lean); boxes come from the VLM
      WARMUP_OCR: "0"
    volumes:
      - processiq_data:/app/objstore_data   # persist uploaded screenshots across restarts
    restart: unless-stopped

volumes:
  processiq_data:
