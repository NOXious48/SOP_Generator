# Helm values (design Section 13.2/13.3). Owner: Tarun.
api:
  image: processiq-api:latest
  replicas: 2
  port: 8000
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits: { cpu: "1", memory: "1Gi" }

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

gpuInference:
  enabled: false           # enable on GPU node pool
  image: processiq-inference:latest
  replicas: 1
  nodeSelector: { gpu: "true" }
  resources:
    limits: { nvidia.com/gpu: 1 }

env:
  APP_ENV: prod
  INFERENCE_MODE: hosted   # mock | hosted | local

ingress:
  enabled: true
  host: processiq.example.com
