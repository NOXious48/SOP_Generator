# CI pipeline (design Section 13.4). Owner: Tarun.
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
      - name: Eval gate
        run: python -m eval.harness --gate
      - name: Build API image
        run: docker build -f infra/docker/api.Dockerfile -t processiq-api:ci .
