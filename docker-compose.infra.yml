# OPTIONAL full datastore stack (design Section 13.1) — NOT required to run ProcessIQ.
# The app uses an in-memory store + local object storage by default. Bring these up only when
# wiring the production Postgres/Mongo/Redis/Qdrant/Neo4j/MinIO/NATS backends.
#   docker compose -f docker-compose.infra.yml up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: processiq
      POSTGRES_PASSWORD: processiq
      POSTGRES_DB: processiq
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongodata:/data/db"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrantdata:/qdrant/storage"]

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/processiq
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4jdata:/data"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  nats:
    image: nats:latest
    command: ["-js"]
    ports: ["4222:4222", "8222:8222"]

volumes:
  pgdata:
  mongodata:
  qdrantdata:
  neo4jdata:
  miniodata:
